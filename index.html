<!DOCTYPE html>
<html lang="vi">

<div style="margin-top:10px;">
    <progress id="progressBar" value="0" max="100" style="width:300px;"></progress>
    <span id="percent">0%</span>
</div>

<head>
<meta charset="UTF-8">
<title>Tool Truyện PRO</title>
<style>
body {
    font-family: Arial;
    padding: 20px;
}
button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>📚 TOOL XỬ LÝ TRUYỆN TXT</h2>

<input type="file" id="fileInput"><br><br>

<button onclick="pickFolder()">📁 Chọn Folder</button>
<button onclick="splitChapters()">✂️ Tách Chương</button>
<button onclick="mergeFiles()">📦 Ghép File</button>

<p id="status"></p>

<script>
let dirHandle;

// ===== UI =====
function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

function updateProgress(percent) {
    document.getElementById("progressBar").value = percent;
    document.getElementById("percent").innerText = percent + "%";
}

function pad(num) {
    return num.toString().padStart(3, "0");
}

// ===== CHỌN FOLDER =====
async function pickFolder() {
    dirHandle = await window.showDirectoryPicker();
    setStatus("✅ Đã chọn folder");
}

// ===== NHẬN DIỆN TIÊU ĐỀ CHƯƠNG (SIÊU MẠNH) =====
function getChapterRegex() {
    return new RegExp(
        "(Chương\\s*\\d+[^\\n]{0,50}" +         // Chương 1, Chương 1: abc
        "|Chuong\\s*\\d+[^\\n]{0,50}" +
        "|Chapter\\s*\\d+[^\\n]{0,50}" +
        "|第\\s*\\d+\\s*章[^\\n]{0,50})",
        "gi"
    );
}

// ===== TÁCH CHƯƠNG THEO INDEX (QUAN TRỌNG) =====
function splitByChapter(text) {
    const regex = /(?:^|\n)(Chương\s*\d+\s*[:：\-]?\s*[^\n]{0,50}|第\s*\d+\s*章\s*[:：\-]?\s*[^\n]{0,50})/gi;

    let matches = [...text.matchAll(regex)];
    let chapters = [];

    if (matches.length === 0) return [];

    for (let i = 0; i < matches.length; i++) {
        let start = matches[i].index;

        // Fix vị trí nếu có \n phía trước
        if (text[start] === "\n") start += 1;

        let end = (i + 1 < matches.length)
            ? matches[i + 1].index
            : text.length;

        let content = text.slice(start, end).trim();

        // ===== BỘ LỌC CHỐNG NHẬN SAI =====

        // 1. phải đủ dài (tránh ghi chú)
        if (content.length < 100) continue;

        // 2. phải có xuống dòng (có body thật)
        if (!content.includes("\n")) continue;

        // 3. body phải đủ dài
        let lines = content.split("\n");
        let body = lines.slice(1).join("").trim();

        if (body.length < 50) continue;

        chapters.push(content);
    }

    return chapters;
}

// ===== TÁCH CHƯƠNG =====
async function splitChapters() {
    if (!dirHandle) return alert("Chọn folder trước!");

    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Chọn file TXT!");

    setStatus("⏳ Đang xử lý...");
    updateProgress(0);

    const text = await file.text();
    const chapters = splitByChapter(text);

    if (chapters.length === 0) {
        alert("❌ Không tìm thấy chương!");
        return;
    }

    for (let i = 0; i < chapters.length; i++) {
        let content = chapters[i];

        // tách title + body
        let firstLine = content.split("\n")[0].trim();
        let body = content.substring(firstLine.length).trim();

        let fileName = pad(i + 1) + ".txt";

        const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();

        await writable.write(firstLine + "\n\n" + body);
        await writable.close();

        let percent = Math.floor((i + 1) / chapters.length * 100);
        updateProgress(percent);
    }

    setStatus("✅ Tách chuẩn " + chapters.length + " chương");
}

// ===== GHÉP FILE =====
async function mergeFiles() {
    if (!dirHandle) return alert("Chọn folder trước!");

    setStatus("⏳ Đang ghép...");
    updateProgress(0);

    let files = [];

    for await (const entry of dirHandle.values()) {
        if (entry.kind === "file" && entry.name.endsWith(".txt")) {
            files.push(entry);
        }
    }

    files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    let merged = "";

    for (let i = 0; i < files.length; i++) {
        const file = await files[i].getFile();
        const text = await file.text();

        merged += text + "\n\n";

        let percent = Math.floor((i + 1) / files.length * 100);
        updateProgress(percent);
    }

    const fileHandle = await dirHandle.getFileHandle("FULL_TRUYEN.txt", { create: true });
    const writable = await fileHandle.createWritable();

    await writable.write(merged);
    await writable.close();

    setStatus("✅ Ghép hoàn tất!");
}
</script>

</body>
</html>
